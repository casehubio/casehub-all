name: Sync submodule pointers

on:
  repository_dispatch:
    types: [ecosystem-build-succeeded]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: Update submodule pointers to build SHAs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

      - name: Update submodule pointers
        env:
          TRIGGER: ${{ github.event.client_payload.trigger || 'manual' }}
          SHAS_JSON: ${{ toJson(github.event.client_payload.shas) }}
        run: |
          python3 - << 'PYEOF'
import subprocess, os, sys, json

shas = json.loads(os.environ.get("SHAS_JSON", "{}") or "{}")
if not shas or shas == "null":
    print("No SHAs in payload — nothing to update.")
    sys.exit(0)

if isinstance(shas, str):
    shas = json.loads(shas)

updated = []
for name, sha in shas.items():
    if not sha:
        continue
    path = name.replace("_", "-")
    try:
        subprocess.run(
            ["git", "update-index", "--cacheinfo", f"160000,{sha},{path}"],
            check=True
        )
        updated.append(f"  {path}: {sha[:12]}")
    except subprocess.CalledProcessError:
        print(f"  WARNING: {path} not a submodule — skipping")

if not updated:
    print("No valid submodule SHAs — nothing to update.")
    sys.exit(0)

diff = subprocess.run(["git", "diff", "--staged", "--quiet"])
if diff.returncode == 0:
    print("All pointers already at these SHAs — no commit needed.")
    sys.exit(0)

trigger = os.environ.get("TRIGGER", "workflow_dispatch")
msg = "chore: sync to build-all ({})\n\n".format(trigger) + "\n".join(updated)
subprocess.run(["git", "commit", "-m", msg], check=True)
subprocess.run(["git", "push"], check=True)
print("Updated {} pointer(s).".format(len(updated)))
PYEOF
